<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="چت‌بات هوشمند سایت">
  <title>مکالمه چت‌بات هوشمند با مشتری</title>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#162236"/>
      <stop offset="100%" stop-color="#0A1520"/>
    </linearGradient>
    <radialGradient id="glow3" cx="52%" cy="50%" r="54%">
      <stop offset="0%" stop-color="#2E7D6B" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#0A1520" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg3)"/>
  <rect width="640" height="360" fill="url(#glow3)"/>
  <!-- Bot avatar circle -->
  <circle cx="152" cy="92" r="30" fill="#2E7D6B" opacity=".85"/>
  <!-- Robot face -->
  <rect x="140" y="81" width="11" height="11" rx="2.5" fill="#fff" opacity=".9"/>
  <rect x="155" y="81" width="11" height="11" rx="2.5" fill="#fff" opacity=".9"/>
  <path d="M141 101 Q152 110 163 101" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Antenna -->
  <line x1="152" y1="62" x2="152" y2="52" stroke="#5FBFA8" stroke-width="2"/>
  <circle cx="152" cy="49" r="3" fill="#5FBFA8"/>
  <!-- Bot bubble 1 -->
  <rect x="195" y="64" width="230" height="56" rx="16" fill="#2E7D6B" opacity=".65"/>
  <path d="M195 90 L178 96 L195 80" fill="#2E7D6B" opacity=".65"/>
  <text x="310" y="88" text-anchor="middle" fill="#fff" font-size="12" font-family="sans-serif">سلام! چطور می‌تونم</text>
  <text x="310" y="106" text-anchor="middle" fill="#fff" font-size="12" font-family="sans-serif">کمکتون کنم؟ 👋</text>
  <!-- User bubble -->
  <rect x="215" y="148" width="195" height="46" rx="16" fill="#1E3048"/>
  <path d="M410 164 L428 170 L412 150" fill="#1E3048"/>
  <text x="312" y="176" text-anchor="middle" fill="#94A3B8" font-size="12" font-family="sans-serif">قیمت طراحی سایت چنده؟</text>
  <!-- User avatar (right side) -->
  <circle cx="446" cy="171" r="22" fill="#1E3048" stroke="#2E7D6B" stroke-width="1.5"/>
  <circle cx="446" cy="163" r="8" fill="#64748B"/>
  <path d="M430 190 Q446 178 462 190" fill="#64748B"/>
  <!-- Bot bubble 2 -->
  <rect x="142" y="222" width="290" height="54" rx="16" fill="#2E7D6B" opacity=".75"/>
  <path d="M195 246 L175 254 L193 230" fill="#2E7D6B" opacity=".75"/>
  <text x="287" y="246" text-anchor="middle" fill="#fff" font-size="11.5" font-family="sans-serif">بستگی به نوع پروژه داره.</text>
  <text x="287" y="263" text-anchor="middle" fill="#fff" font-size="11.5" font-family="sans-serif">یه مشاوره رایگان بذاریم؟</text>
  <!-- Typing indicator -->
  <rect x="142" y="295" width="72" height="34" rx="17" fill="#162236" stroke="#1E3048" stroke-width="1"/>
  <circle cx="163" cy="312" r="5" fill="#3FA08A"/>
  <circle cx="179" cy="312" r="5" fill="#3FA08A" opacity=".65"/>
  <circle cx="195" cy="312" r="5" fill="#3FA08A" opacity=".35"/>
  <!-- Bottom label -->
  <text x="410" y="340" fill="#5FBFA8" font-size="10" font-family="sans-serif" font-weight="600" opacity=".6" letter-spacing="1.5">SMART CHATBOT</text>
</svg>
