<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="معیارهای Core Web Vitals با امتیاز خوب">
  <title>امتیاز Core Web Vitals — LCP، INP، CLS در محدوده خوب</title>
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#162236"/>
      <stop offset="100%" stop-color="#0A1520"/>
    </linearGradient>
    <radialGradient id="glow5" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2E7D6B" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#0A1520" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg5)"/>
  <rect width="640" height="360" fill="url(#glow5)"/>
  <!-- LCP gauge -->
  <circle cx="148" cy="172" r="82" fill="none" stroke="#1E3048" stroke-width="12"/>
  <circle cx="148" cy="172" r="82" fill="none" stroke="#2E7D6B" stroke-width="12"
    stroke-dasharray="430" stroke-dashoffset="86"
    stroke-linecap="round" transform="rotate(-90 148 172)"/>
  <text x="148" y="164" text-anchor="middle" fill="#fff" font-size="24" font-family="sans-serif" font-weight="700">1.8s</text>
  <text x="148" y="186" text-anchor="middle" fill="#5FBFA8" font-size="13" font-family="sans-serif" font-weight="600">LCP</text>
  <!-- LCP good badge -->
  <rect x="190" y="96" width="42" height="20" rx="10" fill="#2E7D6B"/>
  <text x="211" y="110" text-anchor="middle" fill="#fff" font-size="10" font-family="sans-serif" font-weight="700">خوب</text>
  <!-- INP gauge -->
  <circle cx="320" cy="172" r="82" fill="none" stroke="#1E3048" stroke-width="12"/>
  <circle cx="320" cy="172" r="82" fill="none" stroke="#3FA08A" stroke-width="12"
    stroke-dasharray="430" stroke-dashoffset="129"
    stroke-linecap="round" transform="rotate(-90 320 172)"/>
  <text x="320" y="161" text-anchor="middle" fill="#fff" font-size="20" font-family="sans-serif" font-weight="700">180</text>
  <text x="320" y="180" text-anchor="middle" fill="#fff" font-size="11" font-family="sans-serif" opacity=".7">ms</text>
  <text x="320" y="196" text-anchor="middle" fill="#5FBFA8" font-size="13" font-family="sans-serif" font-weight="600">INP</text>
  <!-- INP good badge -->
  <rect x="362" y="96" width="42" height="20" rx="10" fill="#3FA08A"/>
  <text x="383" y="110" text-anchor="middle" fill="#fff" font-size="10" font-family="sans-serif" font-weight="700">خوب</text>
  <!-- CLS gauge -->
  <circle cx="492" cy="172" r="82" fill="none" stroke="#1E3048" stroke-width="12"/>
  <circle cx="492" cy="172" r="82" fill="none" stroke="#5FBFA8" stroke-width="12"
    stroke-dasharray="430" stroke-dashoffset="43"
    stroke-linecap="round" transform="rotate(-90 492 172)"/>
  <text x="492" y="164" text-anchor="middle" fill="#fff" font-size="24" font-family="sans-serif" font-weight="700">0.05</text>
  <text x="492" y="186" text-anchor="middle" fill="#5FBFA8" font-size="13" font-family="sans-serif" font-weight="600">CLS</text>
  <!-- CLS good badge -->
  <rect x="534" y="96" width="42" height="20" rx="10" fill="#5FBFA8"/>
  <text x="555" y="110" text-anchor="middle" fill="#0E1A2B" font-size="10" font-family="sans-serif" font-weight="700">خوب</text>
  <!-- Bottom label -->
  <text x="148" y="340" fill="#5FBFA8" font-size="10" font-family="sans-serif" font-weight="600" opacity=".6" letter-spacing="1.5">CORE WEB VITALS</text>
</svg>
