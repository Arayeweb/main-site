<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="قیف تبدیل بازدیدکننده به مشتری">
  <title>قیف تبدیل بازدیدکننده به مشتری</title>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#162236"/>
      <stop offset="100%" stop-color="#0A1520"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="48%" r="52%">
      <stop offset="0%" stop-color="#2E7D6B" stop-opacity=".32"/>
      <stop offset="100%" stop-color="#0A1520" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg2)"/>
  <rect width="640" height="360" fill="url(#glow2)"/>
  <!-- Funnel layers -->
  <path d="M158 72 L482 72 L416 148 L224 148 Z" fill="#2E7D6B" opacity=".38"/>
  <path d="M224 158 L416 158 L376 228 L264 228 Z" fill="#2E7D6B" opacity=".58"/>
  <path d="M264 238 L376 238 L352 298 L288 298 Z" fill="#3FA08A"/>
  <!-- Funnel divider lines -->
  <line x1="224" y1="148" x2="224" y2="158" stroke="#0A1520" stroke-width="2"/>
  <line x1="416" y1="148" x2="416" y2="158" stroke="#0A1520" stroke-width="2"/>
  <line x1="264" y1="228" x2="264" y2="238" stroke="#0A1520" stroke-width="2"/>
  <line x1="376" y1="228" x2="376" y2="238" stroke="#0A1520" stroke-width="2"/>
  <!-- Labels inside funnel -->
  <text x="320" y="118" text-anchor="middle" fill="#fff" font-size="13" font-family="sans-serif" font-weight="700" opacity=".9">بازدیدکننده</text>
  <text x="320" y="200" text-anchor="middle" fill="#fff" font-size="13" font-family="sans-serif" font-weight="700">لید</text>
  <text x="320" y="272" text-anchor="middle" fill="#fff" font-size="14" font-family="sans-serif" font-weight="800">مشتری</text>
  <!-- Percentages on right -->
  <text x="502" y="118" fill="#5FBFA8" font-size="18" font-family="sans-serif" font-weight="700">۱۰۰٪</text>
  <text x="502" y="200" fill="#5FBFA8" font-size="18" font-family="sans-serif" font-weight="700">۳۸٪</text>
  <text x="502" y="272" fill="#fff" font-size="18" font-family="sans-serif" font-weight="800">۱۵٪</text>
  <!-- Upward arrow on left -->
  <line x1="116" y1="298" x2="116" y2="72" stroke="#2E7D6B" stroke-width="2" opacity=".5"/>
  <polyline points="108,90 116,72 124,90" fill="none" stroke="#2E7D6B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".5"/>
  <text x="116" y="318" text-anchor="middle" fill="#5FBFA8" font-size="9" font-family="sans-serif" opacity=".5">نرخ</text>
  <!-- Bottom label -->
  <text x="158" y="340" fill="#5FBFA8" font-size="10" font-family="sans-serif" font-weight="600" opacity=".6" letter-spacing="1.5">CONVERSION RATE</text>
</svg>
