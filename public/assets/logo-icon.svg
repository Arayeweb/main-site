<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="rect-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3FA08A" stop-opacity="1" />
      <stop offset="100%" stop-color="#216454" stop-opacity="0.3" />
    </linearGradient>
    <linearGradient id="a-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8B45A" />
      <stop offset="100%" stop-color="#F2D093" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Box -->
  <rect x="15" y="15" width="90" height="90" rx="24" fill="none" stroke="url(#rect-grad)" stroke-width="5" />
  
  <!-- Outer Glow Point -->
  <circle cx="28" cy="28" r="4" fill="#3FA08A" filter="url(#glow)" />
  <circle cx="92" cy="92" r="3" fill="#3FA08A" filter="url(#glow)" />

  <!-- The "A" / Chevron / آرایه -->
  <path d="M 35 80 L 60 30 L 85 80" fill="none" stroke="url(#a-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 45 60 L 75 60" fill="none" stroke="url(#a-grad)" stroke-width="8" stroke-linecap="round" />
  
  <!-- Central Tech Dot -->
  <circle cx="60" cy="45" r="4" fill="#fff" />
</svg>
